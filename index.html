<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louisiana Child</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #000;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* Background image */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('hero-bg.jpg');
            background-size: cover;
            background-position: center calc(50% + 100px);
            filter: grayscale(100%) contrast(1.15) brightness(0.85);
            z-index: 1;
        }

        /* Dark overlay */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 50%, transparent 0%, rgba(0,0,0,0.3) 70%),
                linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.75) 100%);
            z-index: 2;
        }

        /* Logo container */
        .hero-content {
            position: absolute;
            top: -50px;
            left: 20px;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        /* Logo image - transparent PNG lets hero bleed through */
        .band-logo {
            width: 315px;
            height: auto;
            filter: drop-shadow(2px 2px 8px rgba(0,0,0,0.5));
        }

        /* Navigation */
        .nav {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 10;
            display: flex;
            gap: 2.5rem;
        }

        .nav a {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: #a0a0a0;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s ease;
        }

        .nav a:hover {
            color: #ece8da;
        }

        /* Hero social icons */
        .hero-social {
            position: absolute;
            bottom: 30px;
            left: 40px;
            z-index: 10;
            display: flex;
            gap: 1.5rem;
        }

        .hero-social a {
            color: #a0a0a0;
            transition: color 0.3s ease;
        }

        .hero-social a:hover {
            color: #ece8da;
        }

        .hero-social svg {
            width: 20px;
            height: 20px;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Film grain */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Vignette */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 4;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero-content {
                top: -30px;
                left: -30px;
            }

            .band-logo {
                width: 225px;
            }

            .hero-bg {
                background-position: center calc(50% + 100px);
            }

            .nav {
                top: 20px;
                right: 20px;
                gap: 1.5rem;
            }

            .nav a {
                font-size: 0.65rem;
            }

            .hero-social {
                bottom: 20px;
                left: 20px;
                gap: 1.25rem;
            }

            .hero-social svg {
                width: 18px;
                height: 18px;
            }
        }

        /* ========================================
           SECTIONS
           ======================================== */

        section {
            background: #0a0a0a;
            padding: 5rem 0;
            border-top: 1px solid rgba(236, 232, 218, 0.1);
        }

        .section-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            text-align: center;
        }

        .section-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(1.4rem, 3.5vw, 1.9rem);
            font-weight: 700;
            color: #ece8da;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
        }

        /* Shows */
        .shows {
            min-height: 40vh;
            display: flex;
            align-items: center;
        }

        .shows .section-container {
            width: 100%;
        }

        .coming-soon {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 400;
            color: rgba(236, 232, 218, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            padding: 2.5rem 3.5rem;
            border: 1px solid rgba(236, 232, 218, 0.1);
            display: inline-block;
        }

        /* Music */
        .music {
            background: #070707;
        }

        /* Merch */
        .merch {
            background: #0a0a0a;
            min-height: 40vh;
            display: flex;
            align-items: center;
        }

        .merch .section-container {
            width: 100%;
        }

        .streaming-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.25rem;
        }

        .stream-link {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.9rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(236, 232, 218, 0.2);
            color: #ece8da;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: all 0.3s ease;
        }

        .stream-link:hover {
            background: #ece8da;
            color: #0a0a0a;
            border-color: #ece8da;
        }

        .stream-link svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Contact */
        .contact {
            padding-bottom: 3rem;
        }

        .booking {
            margin-top: 0;
        }

        .booking p {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 0.7rem;
            color: rgba(236, 232, 218, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 0.6rem;
        }

        .email-link {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.95rem;
            color: #ece8da;
            text-decoration: none;
            border-bottom: 1px solid rgba(236, 232, 218, 0.25);
            padding-bottom: 2px;
            transition: border-color 0.3s ease;
        }

        .email-link:hover {
            border-color: #ece8da;
        }

        /* Footer */
        .footer {
            background: #050505;
            padding: 1.75rem;
            text-align: center;
            border-top: 1px solid rgba(236, 232, 218, 0.06);
        }

        .footer p {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 0.6rem;
            color: rgba(236, 232, 218, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* Responsive sections */
        @media (max-width: 600px) {
            section {
                padding: 3rem 0;
            }

            .section-container {
                padding: 0 1.25rem;
            }

            .streaming-links {
                gap: 0.9rem;
            }

            .stream-link {
                padding: 0.75rem 1.1rem;
                font-size: 0.65rem;
            }

            .stream-link svg {
                width: 17px;
                height: 17px;
            }
        }
    </style>
</head>
